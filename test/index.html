<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donation Tip</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons for the chevron -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    .text-navy { color: #003366; }
    .text-brand-green { color: #198754; } /* Standard Bootstrap success green */
    .btn-tip {
      background-color: #ffffff;
      color: #198754;
      border: 1px solid #dee2e6;
    }
    .btn-tip:hover {
      background-color: #f8f9fa;
      color: #146c43;
    }
    .btn-tip.active {
      background-color: #eaf5f0; /* Light green background */
      border-color: #198754;
      color: #198754;
    }
  </style>
</head>
<body>

<div class="container mt-4" style="max-width: 600px;">
  <!-- Header Row -->
  <div class="d-flex justify-content-between align-items-start mb-2">
    <div>
      <h5 class="fw-bold mb-1 text-navy">Share Some Love?</h5>
      <p class="mb-0 text-navy">Add 16% to help us fund urgent campaigns</p>
    </div>
    <!-- Chevron Icon -->
    <i class="bi bi-chevron-up text-secondary fs-5 cursor-pointer"></i>
  </div>

  <!-- Description Text -->
  <p class="text-secondary mb-3">
    Your tip allows us to continue helping more people & communities at a reduced fee!
  </p>

  <!-- Tip Buttons -->
  <div class="d-flex flex-wrap gap-2">
    <button class="btn btn-tip rounded-pill px-4 py-2">11%</button>
    <button class="btn btn-tip active rounded-pill px-4 py-2">16%</button>
    <button class="btn btn-tip rounded-pill px-4 py-2">21%</button>
    <button class="btn btn-tip rounded-pill px-4 py-2 fw-bold">Other Amount</button>
  </div>
</div>

<!-- Bootstrap JS (Optional, for interactivity if this is part of an accordion) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
